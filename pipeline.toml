# Central config for update -> prepare -> train -> predict -> plot scripts.
# Scripts are config-driven and only accept --config.

[paths]
store = "data/1m"
prepared_root = "prepared"
checkpoints_root = "checkpoints"
sync_state = "sync_state.json"

[data]
interval = "1m"
symbols = ["AAPL", "ABNB", "ACN", "ADBE", "ADI", "AFRM", "AI", "AMAT", "AMD", "AMZN", "ANET", "APPS", "ARM", "ASML", "AVGO", "BABA", "BIDU", "BILI", "CDNS", "CFLT", "COIN", "CRM", "CRWD", "CSCO", "CTSH", "DDOG", "DELL", "DOCU", "ESTC", "FIS", "FISV", "FTNT", "GLOB", "GOOG", "GOOGL", "GPN", "HPE", "HPQ", "HUBS", "IBM", "INFY", "INTC", "INTU", "IOT", "JD", "KLAC", "LRCX", "MA", "MCHP", "MDB", "MELI", "META", "MPWR", "MRVL", "MSFT", "MU", "NET", "NFLX", "NOW", "NTAP", "NTES", "NVDA", "NXPI", "OKTA", "ON", "ORCL", "PANW", "PATH", "PDD", "PLTR", "PYPL", "QCOM", "QRVO", "RBLX", "ROKU", "SAP", "SE", "SHOP", "SMCI", "SNOW", "SNPS", "SONY", "SPOT", "STX", "SWKS", "TCEHY", "TCOM", "TEAM", "TSLA", "TSM", "TWLO", "TXN", "U", "UBER", "V", "VEEV", "WDC", "WIT", "ZM", "ZS"]
prepost = false
daily_budget = 25

[prepare]
val_frac = 0.15
test_frac = 0.15
lookback = 20
width_minutes = 40
height_pct = 1
target_bars_per_day = 50
volatility_scaled_barrier = true
vol_scale_min = 0.5
vol_scale_max = 2.0
skip_opening_minutes = 30

[train]
experiment_id = "last"
model = "resnls"
epochs = 50
batch_size = 256
learning_rate = 0.001
patience = 10
device = "cpu"

[predict]
experiment_id = "last"
model = "resnls"
split = "test"
tickers = []
required_buy_probability = 0.62
required_sell_probability = 0.62
execution_priority = "model_confidence"
top_k_per_timestamp = 2
ticker_cooldown_minutes = 60

[daily]
roll_forward = true
recent_days = 7

[plot]
experiment_id = "last"
model = "resnls"
split = "test"
show = false
# out_dir = "prepared/<exp-id>/eval/<model>_<split>/figures"

[ensemble]
models = []
