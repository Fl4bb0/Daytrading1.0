# Central config for update -> prepare -> train -> predict -> plot scripts.
# Scripts are config-driven and only accept --config.

[paths]
store = "data/1m"
prepared_root = "prepared"
checkpoints_root = "checkpoints"
sync_state = "sync_state.json"

[data]
interval = "1m"
symbols = []
prepost = false
daily_budget = 25

[prepare]
val_frac = 0.15
test_frac = 0.15
lookback = 20
width_minutes = 20
height_pct = 0.5
target_bars_per_day = 195
volatility_scaled_barrier = true
vol_scale_min = 0.5
vol_scale_max = 2.0

[train]
experiment_id = "last"
model = "resnls"
epochs = 50
batch_size = 256
learning_rate = 0.001
patience = 10
device = "cpu"

[predict]
experiment_id = "last"
model = "resnls"
split = "test"
tickers = []
required_buy_probability = 0.48
required_sell_probability = 0.48

[daily]
roll_forward = true
recent_days = 7

[plot]
experiment_id = "last"
model = "resnls"
split = "test"
show = false
# out_dir = "prepared/<exp-id>/eval/<model>_<split>/figures"

