# Central config for update -> prepare -> train -> predict -> plot scripts.
# Scripts are config-driven and only accept --config.

[paths]
store = "data/1m"
prepared_root = "prepared"
checkpoints_root = "checkpoints"
sync_state = "sync_state.json"

[trading]
brokerage_fee = 0.0004

[data]
interval = "1m"
symbols = ["AAPL", "ABNB", "ACN", "ADBE", "ADI", "AFRM", "AI", "AMAT", "AMD", "AMZN", "ANET", "APPS", "ARM", "ASML", "AVGO", "BABA", "BIDU", "BILI", "CDNS", "CFLT", "COIN", "CRM", "CRWD", "CSCO", "CTSH", "DDOG", "DELL", "DOCU", "ESTC", "FIS", "FISV", "FTNT", "GLOB", "GOOG", "GOOGL", "GPN", "HPE", "HPQ", "HUBS", "IBM", "INFY", "INTC", "INTU", "IOT", "JD", "KLAC", "LRCX", "MA", "MCHP", "MDB", "MELI", "META", "MPWR", "MRVL", "MSFT", "MU", "NET", "NFLX", "NOW", "NTAP", "NTES", "NVDA", "NXPI", "OKTA", "ON", "ORCL", "PANW", "PATH", "PDD", "PLTR", "PYPL", "QCOM", "QRVO", "RBLX", "ROKU", "SAP", "SE", "SHOP", "SMCI", "SNOW", "SNPS", "SONY", "SPOT", "STX", "SWKS", "TCEHY", "TCOM", "TEAM", "TSLA", "TSM", "TWLO", "TXN", "U", "UBER", "V", "VEEV", "WDC", "WIT", "ZM", "ZS"]
prepost = false
daily_budget = 25

[prepare]
val_frac = 0.15
test_frac = 0.15
lookback = 20
width_minutes = 40
height_pct = 1
target_bars_per_day = 50
volatility_scaled_barrier = true
vol_scale_min = 0.5
vol_scale_max = 2.0
skip_opening_minutes = 30
train_start_month = "2025-01"
train_end_month = "2025-06"
test_start_month = "2025-07"
test_end_month = "2025-07"
num_workers = 4

[walk_forward]
enabled = true
mode = "expanding"
# run_id = "wf_manual_name"
start_month = "2025-01"
end_month = "2025-07"
train_span_months = 4
val_span_months = 1
test_span_months = 1
step_span_months = 1
gap_days = 0
max_train_span_months = 6
min_train_rows_per_ticker = 1
min_val_rows_per_ticker = 1
min_test_rows_per_ticker = 1


[train]
experiment_id = "last"
model = "resnls"
epochs = 50
batch_size = 256
learning_rate = 0.001
patience = 10
device = "auto"

[predict]
experiment_id = "last"
model = "resnls"
split = "test"
tickers = []
required_buy_probability = 0.5
required_sell_probability = 0.5
allow_short = false # option to go long only
execution_priority = "meta_score" # write model_confidence to switch
top_k_per_timestamp = 2
ticker_cooldown_minutes = 60
max_concurrent_positions_per_ticker = 1

[meta]
enabled = true # turn on the meta layer
train_split = "val"
alpha = 1.0 # regularization
shrinkage_k = 10.0
min_score_buy = -0.0015 # min. meta score threshold for trade to be executed
min_score_short = -0.0033

[daily]
roll_forward = true
recent_days = 7

[plot]
experiment_id = "last"
model = "resnls"
split = "test"
show = false
# out_dir = "prepared/<exp-id>/eval/<model>_<split>/figures"

[benchmark]
benchmark_id = "benchmark_test"
single_model = "resnls"
random_seeds = 50
random_seed_start = 0
# random_trade_probability = 0.10 # unset means match council post-meta directional rate
random_fallback_trade_probability = 0.03 # used when council produces zero directional trades
shallow_epochs = 20
shallow_patience = 5

[ensemble]
models = ["resnls", "conv1d", "tsb"]

[data_sources]
# Boundary between HuggingFace (historical) and Yahoo (incremental)
hf_end_exclusive = "2026-01-01"
month_pattern = "{YYYY-MM}"
local_cache_root = "data/1m"
enable_hf_backfill = true
verify_existing_months = true
backfill_status_file = ".hf_backfill_status.json"
backfill_time_windows = [
    { start = "2025-01", end = "2025-07" }
]

[hf_config]
# HuggingFace dataset details (set dataset_id to use HF source)
dataset_id = "mito0o852/OHLCV-1m"
cache_dir = "~/.cache/huggingface"
